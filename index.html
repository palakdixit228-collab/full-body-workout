<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Home Workout Pro</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
text-align:center;
padding:20px;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
background:#020617;
padding:10px;
}

nav button{
margin:4px;
padding:8px 14px;
border:none;
border-radius:6px;
background:#22c55e;
cursor:pointer;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:8px;
margin:10px 0;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
margin-top:10px;
}

.timer{
font-size:32px;
text-align:center;
margin:20px;
}

footer{
background:#020617;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>Home Workout Pro</h1>
<p>AI Bodyweight Fitness System</p>
</header>

<nav id="muscleNav"></nav>

<div class="container">

<h2>Search Exercise</h2>
<input id="searchBox" placeholder="Search exercise..." onkeyup="searchExercise()">

<div id="exerciseResults" class="grid"></div>

<h2>AI Workout Generator</h2>

<div class="card" id="aiWorkout">
Click button to generate workout
</div>

<button onclick="generateWorkout()">Generate Workout</button>

<h2>Difficulty Filter</h2>

<button onclick="filterDifficulty('Beginner')">Beginner</button> <button onclick="filterDifficulty('Intermediate')">Intermediate</button> <button onclick="filterDifficulty('Advanced')">Advanced</button>

<h2>Workout Timer</h2>

<div class="timer" id="timer">60</div>

<div style="text-align:center">
<button onclick="startTimer()">Start</button>
</div>

<h2>Workout Music</h2>

<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/playlist/37i9dQZF1DX76Wlfdnj7AP"
width="100%" height="380"></iframe>

</div>

<footer>
<p>Home Workout Pro</p>
</footer>

<script>

const muscles=[
"Neck","Traps","Shoulders","Chest","Upper Back","Lats","Lower Back",
"Biceps","Triceps","Forearms","Abs","Obliques","Serratus","Glutes",
"Quads","Hamstrings","Calves","Hip Flexors","Adductors","Full Body"
]

const nav=document.getElementById("muscleNav")

muscles.forEach(m=>{
let b=document.createElement("button")
b.innerText=m
b.onclick=()=>showMuscle(m)
nav.appendChild(b)
})

let exercises=[]

muscles.forEach(m=>{
for(let i=1;i<=50;i++){

exercises.push({
name:m+" Exercise "+i,
muscle:m,
difficulty:["Beginner","Intermediate","Advanced"][i%3],
gif:"https://media.giphy.com/media/3o7TKMt1VVNkHV2PaE/giphy.gif"
})

}
})

function showMuscle(m){

let results=document.getElementById("exerciseResults")

results.innerHTML=""

exercises.filter(e=>e.muscle===m).slice(0,12).forEach(e=>{

results.innerHTML+=`
<div class="card">
<h4>${e.name}</h4>
<p>${e.muscle} | ${e.difficulty}</p>
<img src="${e.gif}" width="100%">
<button onclick="saveProgress('${e.name}')">Complete</button>
</div>
`

})

}

function searchExercise(){

let q=document.getElementById("searchBox").value.toLowerCase()

let results=document.getElementById("exerciseResults")

results.innerHTML=""

exercises.filter(e=>e.name.toLowerCase().includes(q)).slice(0,12).forEach(e=>{

results.innerHTML+=`
<div class="card">
<h4>${e.name}</h4>
<p>${e.muscle}</p>
<img src="${e.gif}" width="100%">
</div>
`

})

}

function generateWorkout(){

let workout=""

for(let i=0;i<5;i++){

let r=exercises[Math.floor(Math.random()*exercises.length)]

workout+=r.name+" - 15 reps<br>"

}

document.getElementById("aiWorkout").innerHTML=workout

}

function filterDifficulty(d){

let results=document.getElementById("exerciseResults")

results.innerHTML=""

exercises.filter(e=>e.difficulty===d).slice(0,12).forEach(e=>{

results.innerHTML+=`
<div class="card">
<h4>${e.name}</h4>
<p>${e.muscle}</p>
<img src="${e.gif}" width="100%">
</div>
`

})

}

function startTimer(){

let t=60

let timer=document.getElementById("timer")

let interval=setInterval(()=>{

t--

timer.innerText=t

if(t<=0) clearInterval(interval)

},1000)

}

function saveProgress(ex){

let progress=JSON.parse(localStorage.getItem("progress"))||[]

progress.push(ex)

localStorage.setItem("progress",JSON.stringify(progress))

alert("Exercise saved to progress")

}

</script>

</body>
</html>
